# Nginx configuration for the React SPA:
# - Serves static files from /usr/share/nginx/html
# - Routes all non-asset requests to index.html (SPA client-side routing)
# - Serves /config.json with runtime API URL (from env var injection at container start)
# - Runs on port 8080 (Emerald requirement — never 80)
# AI-assisted: Nginx SPA configuration; reviewed and directed by Ryan Loiselle.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # ── /config.json — runtime API URL injection ─────────────────────────────
    # This file is generated at container start by an entrypoint script (or
    # mounted via ConfigMap in OpenShift). It exposes VITE_API_URL at runtime
    # without baking it into the built image.
    location = /config.json {
        default_type application/json;
        # OpenShift: override with ConfigMap mount at /usr/share/nginx/html/config.json
        try_files /config.json =404;
    }

    # ── Static assets with cache headers ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check endpoint (for OpenShift readiness/liveness) ─────────────
    location = /nginx-health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
