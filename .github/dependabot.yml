# .github/dependabot.yml — HelloNetworkWorld dependency updates
# Ryan Loiselle — Developer / Architect
# February 2026

version: 2
updates:
  # NuGet (.NET API + Data)
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dotnet

  # npm (React frontend)
  - package-ecosystem: npm
    directory: "/src/HNW.WebClient"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
